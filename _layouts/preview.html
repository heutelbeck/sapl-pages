<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}{% unless page.title contains 'SAPL' %} - SAPL{% endunless %}</title>
  <link rel="stylesheet" href="/assets/css/preview.css">
  <link rel="icon" href="/assets/favicon.png">
  <script>
    // Set theme before render to prevent flash
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="/preview/" class="logo">
        <img src="/assets/sapl-icon-light.svg" alt="SAPL" class="logo-light">
        <img src="/assets/sapl-icon.svg" alt="SAPL" class="logo-dark">
        <span class="logo-text">SAPL<span class="logo-subtitle">Streaming Attribute Policy Language</span></span>
      </a>
      <div class="nav-links">
        <a href="/preview/">Home</a>
        <a href="/preview/getstarted">Get Started</a>
        <a href="/docs/latest/">Docs</a>
        <a href="https://playground.sapl.io/">Playground</a>
        <a href="https://github.com/heutelbeck/sapl-policy-engine">GitHub</a>
        <a href="https://discord.gg/pRXEVWm3xM">Discord</a>
        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <p>&copy; 2026 SAPL - The Streaming Attribute Policy Language</p>
    </div>
  </footer>
  <script>
    function syncTheme() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    }

    document.querySelector('.theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Sync theme when returning via back/forward navigation
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) syncTheme();
    });

    // Tab switching
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var parent = this.closest('.code-tabs');
        parent.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        parent.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        this.classList.add('active');
        parent.querySelector('#tab-' + this.dataset.tab).classList.add('active');
      });
    });

    // CodeMirror for all code blocks — reuses the embed's loaded modules
    (async function() {
      var [{EditorView, minimalSetup}, {StreamLanguage}, {oneDark}, {lineNumbers}] = await Promise.all([
        import('https://esm.sh/codemirror'),
        import('https://esm.sh/@codemirror/language'),
        import('https://esm.sh/@codemirror/theme-one-dark'),
        import('https://esm.sh/@codemirror/view')
      ]);

      // SAPL language mode — aligned with SAPLLexer.g4
      var saplLanguage = StreamLanguage.define({
        token: function(stream) {
          if (stream.match(/\/\/.*/)) return 'comment';
          if (stream.match(/\/\*[\s\S]*?\*\//)) return 'comment';
          if (stream.match(/"(?:[^"\\]|\\.)*"/)) return 'string';
          if (stream.match(/-?\d+(\.\d+)?([eE][+-]?\d+)?/)) return 'number';
          if (stream.match(/\b(policy|set|permit|deny|import|as|var|schema|enforced|advice|obligation|transform|in|each|for)\b/)) return 'keyword';
          if (stream.match(/\b(subject|action|resource|environment)\b/)) return 'variableName.special';
          if (stream.match(/\b(true|false|null|undefined)\b/)) return 'atom';
          if (stream.match(/\b(first|priority|unanimous|strict|unique|or|abstain|errors|propagate)\b/)) return 'keyword';
          if (stream.match(/[a-zA-Z_$][a-zA-Z_$0-9]*/)) return 'variableName';
          if (stream.match(/\|\-|::|==|!=|=~|<=|>=|\|\<|\|\||&&/)) return 'operator';
          if (stream.match(/[+\-*/%<>=!&|^~?:@#]+/)) return 'operator';
          stream.next();
          return null;
        }
      });

      // SAPLTest language mode — aligned with SAPLTestLexer.g4
      var saplTestLanguage = StreamLanguage.define({
        token: function(stream) {
          if (stream.match(/\/\/.*/)) return 'comment';
          if (stream.match(/\/\*[\s\S]*?\*\//)) return 'comment';
          if (stream.match(/"(?:[^"\\]|\\.)*"/)) return 'string';
          if (stream.match(/-?\d+(\.\d+)?([eE][+-]?\d+)?/)) return 'number';
          if (stream.match(/\b(not-applicable|pdp-configuration|null-or-empty|null-or-blank|case-insensitive|virtual-time)\b/)) return 'keyword';
          if (stream.match(/\b(requirement|scenario|given|when|then|expect|verify)\b/)) return 'keyword';
          if (stream.match(/\b(permit|deny|indeterminate|decision)\b/)) return 'keyword';
          if (stream.match(/\b(subject|action|resource|environment|attempts|on)\b/)) return 'variableName.special';
          if (stream.match(/\b(function|attribute|maps|to|emits|stream|of|is|called|error|next|once|times)\b/)) return 'keyword';
          if (stream.match(/\b(variables|secrets|configuration|document|documents)\b/)) return 'keyword';
          if (stream.match(/\b(first|priority|unanimous|strict|unique|or|abstain|errors|propagate)\b/)) return 'keyword';
          if (stream.match(/\b(matching|any|equals|equal|containing|key|value|where|with|obligation|advice|obligations|and|in)\b/)) return 'keyword';
          if (stream.match(/\b(blank|empty|compressed|whitespace|regex|starting|ending|length|order)\b/)) return 'keyword';
          if (stream.match(/\b(null|text|number|boolean|array|object)\b/)) return 'typeName';
          if (stream.match(/\b(true|false|undefined)\b/)) return 'atom';
          if (stream.match(/\b(policy|set|policies)\b/)) return 'keyword';
          if (stream.match(/[a-zA-Z_$][a-zA-Z_$0-9]*/)) return 'variableName';
          stream.next();
          return null;
        }
      });

      // Language module cache for framework tabs
      var langModules = {};
      async function getLang(name) {
        if (langModules[name]) return langModules[name];
        var mod;
        if (name === 'java') mod = await import('https://esm.sh/@codemirror/lang-java');
        else if (name === 'python') mod = await import('https://esm.sh/@codemirror/lang-python');
        else if (name === 'javascript') mod = await import('https://esm.sh/@codemirror/lang-javascript');
        else return null;
        langModules[name] = mod;
        return mod;
      }

      function getLangExtension(name) {
        if (name === 'sapl') return saplLanguage;
        if (name === 'sapltest') return saplTestLanguage;
        return null;
      }

      document.querySelectorAll('.cm-source').forEach(async function(pre) {
        var code = pre.querySelector('code').textContent;
        var container = pre.closest('[data-lang]');
        var lang = container ? container.dataset.lang : null;
        var extensions = [minimalSetup, oneDark, lineNumbers(), EditorView.editable.of(false)];

        // Check for built-in SAPL/SAPLTest modes first
        var builtinExt = getLangExtension(lang);
        if (builtinExt) {
          extensions.push(builtinExt);
        } else if (lang) {
          // Load external language module
          var langMod = await getLang(lang);
          if (langMod) {
            if (langMod.java) extensions.push(langMod.java());
            else if (langMod.python) extensions.push(langMod.python());
            else if (langMod.javascript) extensions.push(langMod.javascript({ typescript: true }));
          }
        }

        var editorDiv = document.createElement('div');
        pre.replaceWith(editorDiv);
        new EditorView({ doc: code, extensions: extensions, parent: editorDiv });
      });
    })();
  </script>
</body>
</html>
