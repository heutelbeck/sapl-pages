<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} - SAPL</title>
  <link rel="stylesheet" href="/assets/css/preview.css">
  <link rel="icon" href="/assets/favicon.png">
  <script>
    // Set theme before render to prevent flash
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="/preview/" class="logo">
        <img src="/assets/sapl-icon-light.svg" alt="SAPL" class="logo-light">
        <img src="/assets/sapl-icon.svg" alt="SAPL" class="logo-dark">
        <span class="logo-text">SAPL<span class="logo-subtitle">Streaming Attribute Policy Language</span></span>
      </a>
      <div class="nav-links">
        <a href="/preview/">Home</a>
        <a href="/preview/getstarted">Get Started</a>
        <a href="/docs/latest/">Docs</a>
        <a href="https://playground.sapl.io/">Playground</a>
        <a href="https://github.com/heutelbeck/sapl-policy-engine">GitHub</a>
        <a href="https://discord.gg/pRXEVWm3xM">Discord</a>
        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <p>&copy; 2026 SAPL - The Streaming Attribute Policy Language</p>
    </div>
  </footer>
  <script>
    function syncTheme() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    }

    document.querySelector('.theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Sync theme when returning via back/forward navigation
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) syncTheme();
    });

    // Tab switching
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var parent = this.closest('.code-tabs');
        parent.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        parent.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        this.classList.add('active');
        parent.querySelector('#tab-' + this.dataset.tab).classList.add('active');
      });
    });

    // CodeMirror for tab code blocks — reuses the embed's loaded modules
    (async function() {
      var langModules = {};
      async function getLang(name) {
        if (langModules[name]) return langModules[name];
        var mod;
        if (name === 'java') mod = await import('https://esm.sh/@codemirror/lang-java');
        else if (name === 'python') mod = await import('https://esm.sh/@codemirror/lang-python');
        else if (name === 'javascript') mod = await import('https://esm.sh/@codemirror/lang-javascript');
        else return null;
        langModules[name] = mod;
        return mod;
      }

      var [{EditorView, minimalSetup}, {oneDark}] = await Promise.all([
        import('https://esm.sh/codemirror'),
        import('https://esm.sh/@codemirror/theme-one-dark')
      ]);

      document.querySelectorAll('.cm-source').forEach(async function(pre) {
        var code = pre.querySelector('code').textContent;
        var lang = pre.closest('.tab-content').dataset.lang;
        var extensions = [minimalSetup, oneDark, EditorView.editable.of(false)];

        var langMod = await getLang(lang);
        if (langMod) {
          if (langMod.java) extensions.push(langMod.java());
          else if (langMod.python) extensions.push(langMod.python());
          else if (langMod.javascript) extensions.push(langMod.javascript({ typescript: true }));
        }

        var editorDiv = document.createElement('div');
        pre.replaceWith(editorDiv);
        new EditorView({ doc: code, extensions: extensions, parent: editorDiv });
      });
    })();
  </script>
</body>
</html>
