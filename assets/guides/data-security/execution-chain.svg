<svg viewBox="0 0 800 195" width="800" height="195" xmlns="http://www.w3.org/2000/svg"
     text-rendering="optimizeLegibility" shape-rendering="geometricPrecision">

  <rect width="800" height="195" rx="12" fill="#dce4ed"/>

  <defs>
    <marker id="ds-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#028392"/>
    </marker>
  </defs>

  <!-- Protected Data Source container -->
  <rect x="170" y="15" width="560" height="140" rx="14" fill="#e4eaf1"
        stroke="#028392" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="450" y="36" text-anchor="middle" fill="#028392"
        font-family="system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0.03em">Protected Data Source</text>

  <!-- Connection line segments with arrowheads -->
  <line x1="130" y1="88" x2="195" y2="88" stroke="#028392" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arrow)"/>
  <line x1="345" y1="88" x2="385" y2="88" stroke="#028392" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arrow)"/>
  <line x1="505" y1="88" x2="545" y2="88" stroke="#028392" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arrow)"/>

  <!-- Return path -->
  <path d="M 695 88 Q 760 88 760 118 Q 760 165 730 165 L 105 165 Q 75 165 75 135 Q 75 118 75 114"
        fill="none" stroke="#028392" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="80,117 75,105 70,117" fill="#028392"/>

  <!-- Caller -->
  <rect x="20" y="62" width="110" height="52" rx="8" fill="#ffffff" stroke="#028392" stroke-width="1.5"/>
  <text x="75" y="82" text-anchor="middle" dy="0.35em" fill="#1a1a2e"
        font-family="system-ui, sans-serif" font-size="14" font-weight="500">Caller</text>
  <text x="75" y="100" text-anchor="middle" dy="0.35em" fill="rgba(0,0,0,0.38)"
        font-family="system-ui, sans-serif" font-size="10">API, Agent, MCP</text>

  <!-- PRE handler -->
  <rect x="195" y="55" width="150" height="66" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="270" y="72" text-anchor="middle" dy="0.35em" fill="#1a1a2e"
        font-family="system-ui, sans-serif" font-size="13" font-weight="600">PRE</text>
  <text x="270" y="90" text-anchor="middle" dy="0.35em" fill="#4a5568"
        font-family="system-ui, sans-serif" font-size="11">Modify arguments</text>
  <text x="270" y="107" text-anchor="middle" dy="0.35em" fill="rgba(0,0,0,0.38)"
        font-family="system-ui, sans-serif" font-size="9">cap, inject, rewrite query</text>

  <!-- Method -->
  <rect x="385" y="58" width="120" height="60" rx="8" fill="#ffffff" stroke="#028392" stroke-width="1.5"/>
  <text x="445" y="80" text-anchor="middle" dy="0.35em" fill="#1a1a2e"
        font-family="system-ui, sans-serif" font-size="14" font-weight="500">Method</text>
  <text x="445" y="100" text-anchor="middle" dy="0.35em" fill="rgba(0,0,0,0.38)"
        font-family="system-ui, sans-serif" font-size="10">DB, service, tool</text>

  <!-- POST handler -->
  <rect x="545" y="55" width="150" height="66" rx="6" fill="#ffffff" stroke="#028392" stroke-width="2"/>
  <text x="620" y="72" text-anchor="middle" dy="0.35em" fill="#1a1a2e"
        font-family="system-ui, sans-serif" font-size="13" font-weight="600">POST</text>
  <text x="620" y="90" text-anchor="middle" dy="0.35em" fill="#4a5568"
        font-family="system-ui, sans-serif" font-size="11">Filter response</text>
  <text x="620" y="107" text-anchor="middle" dy="0.35em" fill="rgba(0,0,0,0.38)"
        font-family="system-ui, sans-serif" font-size="9">blacken, redact, classify</text>

  <!-- Annotation labels inside container -->
  <text x="270" y="135" text-anchor="middle" fill="rgba(0,0,0,0.38)"
        font-family="'JetBrains Mono', monospace" font-size="9">@PreEnforce  @QueryEnforce</text>
  <text x="270" y="147" text-anchor="middle" fill="rgba(0,0,0,0.38)"
        font-family="'JetBrains Mono', monospace" font-size="9">@Enforce* (streaming)</text>
  <text x="620" y="135" text-anchor="middle" fill="rgba(0,0,0,0.38)"
        font-family="'JetBrains Mono', monospace" font-size="9">@PostEnforce  @QueryEnforce</text>
  <text x="620" y="147" text-anchor="middle" fill="rgba(0,0,0,0.38)"
        font-family="'JetBrains Mono', monospace" font-size="9">@Enforce* (streaming)</text>

  <!-- Return label -->
  <text x="420" y="180" text-anchor="middle" fill="rgba(0,0,0,0.38)"
        font-family="system-ui, sans-serif" font-size="10">filtered response returned to caller</text>
</svg>
