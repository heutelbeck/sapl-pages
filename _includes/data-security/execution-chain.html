<svg viewBox="0 0 800 260" width="100%" xmlns="http://www.w3.org/2000/svg"
     text-rendering="optimizeLegibility" shape-rendering="geometricPrecision"
     style="display:block;margin:1.5rem auto;max-width:800px" id="ds-chain-svg">

  <!-- Background -->
  <rect width="800" height="260" rx="12" class="svg-bg"/>

  <!-- Protected Data Source container (dashed) -->
  <rect x="180" y="30" width="540" height="175" rx="14" fill="none"
        class="svg-container-stroke svg-container-fill" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="450" y="48" text-anchor="middle" class="svg-container-label"
        font-size="12" font-weight="500" letter-spacing="0.03em">Protected Data Source</text>

  <!-- Main connection line through the container -->
  <line x1="130" y1="120" x2="720" y2="120" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Flow arrows -->
  <polygon points="198,115 208,120 198,125" class="svg-arrow"/>
  <polygon points="368,115 378,120 368,125" class="svg-arrow"/>
  <polygon points="498,115 508,120 498,125" class="svg-arrow"/>
  <polygon points="648,115 658,120 648,125" class="svg-arrow"/>

  <!-- Return path (dashed, below) -->
  <path d="M 720 120 Q 750 120 750 160 Q 750 200 720 200 L 130 200 Q 100 200 100 160 Q 100 140 100 130"
        fill="none" class="svg-line" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.5"/>
  <polygon points="105,132 100,122 95,132" class="svg-arrow" opacity="0.5"/>
  <text x="420" y="218" text-anchor="middle" class="svg-text-muted" font-size="8">filtered response returned to caller</text>

  <!-- Caller box -->
  <rect x="30" y="95" width="100" height="50" rx="8" class="svg-node-fill" stroke-width="1.5"/>
  <text x="80" y="114" text-anchor="middle" dy="0.35em" class="svg-text" font-size="11" font-weight="500">Caller</text>
  <text x="80" y="130" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">API, Agent, MCP</text>

  <!-- PRE handler box (like the blacken box from animation) -->
  <rect x="210" y="80" width="160" height="45" rx="6" class="svg-node-fill svg-pre-box" stroke-width="2"/>
  <text x="290" y="96" text-anchor="middle" dy="0.35em" class="svg-text" font-size="10" font-weight="600">PRE: Modify Arguments</text>
  <text x="290" y="112" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">cap, inject, rewrite query</text>

  <!-- Method box (inside container) -->
  <rect x="380" y="85" width="120" height="35" rx="8" class="svg-node-fill" stroke-width="1.5"/>
  <text x="440" y="103" text-anchor="middle" dy="0.35em" class="svg-text" font-size="10" font-weight="500">Method</text>
  <text x="440" y="140" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">DB, service, tool</text>

  <!-- POST handler box (like the blacken box from animation) -->
  <rect x="510" y="80" width="150" height="45" rx="6" class="svg-node-fill svg-post-box" stroke-width="2"/>
  <text x="585" y="96" text-anchor="middle" dy="0.35em" class="svg-text" font-size="10" font-weight="600">POST: Filter Response</text>
  <text x="585" y="112" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">blacken, redact, classify</text>

  <!-- PEP label below container -->
  <text x="450" y="248" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="9">@PreEnforce / @PostEnforce / @QueryEnforce</text>
</svg>

<script>
(function() {
  function applyTheme() {
    var s = getComputedStyle(document.documentElement);
    var v = function(n) { return s.getPropertyValue(n).trim(); };
    var svg = document.getElementById('ds-chain-svg');
    if (!svg) return;
    svg.querySelectorAll('.svg-bg').forEach(function(el) { el.setAttribute('fill', v('--d-bg')); });
    svg.querySelectorAll('.svg-node-fill').forEach(function(el) { el.setAttribute('fill', v('--d-node-fill')); el.setAttribute('stroke', v('--d-node-stroke')); });
    svg.querySelectorAll('.svg-line').forEach(function(el) { el.setAttribute('stroke', v('--d-line-active')); });
    svg.querySelectorAll('.svg-arrow').forEach(function(el) { el.setAttribute('fill', v('--d-line-active')); });
    svg.querySelectorAll('.svg-text').forEach(function(el) { el.setAttribute('fill', v('--d-text')); });
    svg.querySelectorAll('.svg-text-secondary').forEach(function(el) { el.setAttribute('fill', v('--d-text-secondary')); });
    svg.querySelectorAll('.svg-text-muted').forEach(function(el) { el.setAttribute('fill', v('--d-text-muted')); });
    svg.querySelectorAll('.svg-container-stroke').forEach(function(el) { el.setAttribute('stroke', v('--d-container-stroke')); });
    svg.querySelectorAll('.svg-container-fill').forEach(function(el) { el.setAttribute('fill', v('--d-container-fill')); });
    svg.querySelectorAll('.svg-container-label').forEach(function(el) { el.setAttribute('fill', v('--d-container-label')); });
    svg.querySelectorAll('.svg-pre-box').forEach(function(el) { el.setAttribute('stroke', v('--d-permit')); });
    svg.querySelectorAll('.svg-post-box').forEach(function(el) { el.setAttribute('stroke', v('--d-token')); });
  }
  requestAnimationFrame(applyTheme);
  new MutationObserver(applyTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();
</script>
