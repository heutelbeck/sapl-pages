<svg viewBox="0 0 800 200" width="100%" xmlns="http://www.w3.org/2000/svg"
     text-rendering="optimizeLegibility" shape-rendering="geometricPrecision"
     style="display:block;margin:1.5rem auto;max-width:800px" id="ds-chain-svg">

  <rect width="800" height="200" rx="12" class="svg-bg"/>

  <!-- Protected Data Source container -->
  <rect x="170" y="20" width="560" height="130" rx="14" fill="none"
        class="svg-container-stroke svg-container-fill" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="450" y="38" text-anchor="middle" class="svg-container-label"
        font-size="12" font-weight="500" letter-spacing="0.03em">Protected Data Source</text>

  <!-- Connection line segments -->
  <line x1="130" y1="85" x2="195" y2="85" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="345" y1="85" x2="385" y2="85" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="505" y1="85" x2="545" y2="85" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="695" y1="85" x2="730" y2="85" class="svg-line" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Flow arrows -->
  <polygon points="193,80 203,85 193,90" class="svg-arrow"/>
  <polygon points="383,80 393,85 383,90" class="svg-arrow"/>
  <polygon points="543,80 553,85 543,90" class="svg-arrow"/>

  <!-- Return arrow (compact) -->
  <path d="M 730 85 Q 745 85 745 115 Q 745 145 730 145 L 130 145 Q 110 145 110 125 Q 110 105 110 95"
        fill="none" class="svg-line" stroke-width="1" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.35"/>
  <polygon points="115,97 110,87 105,97" class="svg-arrow" opacity="0.35"/>
  <text x="420" y="160" text-anchor="middle" class="svg-text-muted" font-size="8">filtered response returned to caller</text>

  <!-- Caller -->
  <rect x="25" y="62" width="105" height="46" rx="8" class="svg-node-fill" stroke-width="1.5"/>
  <text x="78" y="79" text-anchor="middle" dy="0.35em" class="svg-text" font-size="11" font-weight="500">Caller</text>
  <text x="78" y="95" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">API, Agent, MCP</text>

  <!-- PRE handler -->
  <rect x="195" y="58" width="150" height="54" rx="6" class="svg-node-fill svg-pre-box" stroke-width="2"/>
  <text x="270" y="74" text-anchor="middle" dy="0.35em" class="svg-text" font-size="10" font-weight="600">PRE</text>
  <text x="270" y="88" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="8">Modify arguments</text>
  <text x="270" y="101" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">cap, inject, rewrite query</text>

  <!-- Method -->
  <rect x="385" y="58" width="120" height="54" rx="8" class="svg-node-fill" stroke-width="1.5"/>
  <text x="445" y="77" text-anchor="middle" dy="0.35em" class="svg-text" font-size="11" font-weight="500">Method</text>
  <text x="445" y="95" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">DB, service, tool</text>

  <!-- POST handler -->
  <rect x="545" y="58" width="150" height="54" rx="6" class="svg-node-fill svg-post-box" stroke-width="2"/>
  <text x="620" y="74" text-anchor="middle" dy="0.35em" class="svg-text" font-size="10" font-weight="600">POST</text>
  <text x="620" y="88" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="8">Filter response</text>
  <text x="620" y="101" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="7">blacken, redact, classify</text>

  <!-- Annotation label -->
  <text x="450" y="185" text-anchor="middle" class="svg-text-muted" font-size="9"
        font-family="'JetBrains Mono', monospace">@PreEnforce / @PostEnforce / @QueryEnforce</text>
</svg>

<script>
(function() {
  function applyTheme() {
    var s = getComputedStyle(document.documentElement);
    var v = function(n) { return s.getPropertyValue(n).trim(); };
    var svg = document.getElementById('ds-chain-svg');
    if (!svg) return;
    svg.querySelectorAll('.svg-bg').forEach(function(el) { el.setAttribute('fill', v('--d-bg')); });
    svg.querySelectorAll('.svg-node-fill').forEach(function(el) { el.setAttribute('fill', v('--d-node-fill')); el.setAttribute('stroke', v('--d-node-stroke')); });
    svg.querySelectorAll('.svg-line').forEach(function(el) { el.setAttribute('stroke', v('--d-line-active')); });
    svg.querySelectorAll('.svg-arrow').forEach(function(el) { el.setAttribute('fill', v('--d-line-active')); });
    svg.querySelectorAll('.svg-text').forEach(function(el) { el.setAttribute('fill', v('--d-text')); });
    svg.querySelectorAll('.svg-text-secondary').forEach(function(el) { el.setAttribute('fill', v('--d-text-secondary')); });
    svg.querySelectorAll('.svg-text-muted').forEach(function(el) { el.setAttribute('fill', v('--d-text-muted')); });
    svg.querySelectorAll('.svg-container-stroke').forEach(function(el) { el.setAttribute('stroke', v('--d-container-stroke')); });
    svg.querySelectorAll('.svg-container-fill').forEach(function(el) { el.setAttribute('fill', v('--d-container-fill')); });
    svg.querySelectorAll('.svg-container-label').forEach(function(el) { el.setAttribute('fill', v('--d-container-label')); });
    svg.querySelectorAll('.svg-pre-box').forEach(function(el) { el.setAttribute('stroke', v('--d-permit')); });
    svg.querySelectorAll('.svg-post-box').forEach(function(el) { el.setAttribute('stroke', v('--d-token')); });
  }
  requestAnimationFrame(applyTheme);
  new MutationObserver(applyTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();
</script>
