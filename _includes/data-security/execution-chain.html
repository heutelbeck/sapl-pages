<svg viewBox="0 0 800 200" width="100%" xmlns="http://www.w3.org/2000/svg"
     text-rendering="optimizeLegibility" shape-rendering="geometricPrecision"
     style="display:block;margin:1.5rem auto;max-width:800px" id="ds-chain-svg">

  <rect width="800" height="200" rx="12" class="svg-bg"/>

  <defs>
    <marker id="ds-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="svg-arrow"/>
    </marker>
  </defs>

  <!-- Protected Data Source container -->
  <rect x="170" y="15" width="560" height="140" rx="14" fill="none"
        class="svg-container-stroke svg-container-fill" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="450" y="36" text-anchor="middle" class="svg-container-label"
        font-size="14" font-weight="500" letter-spacing="0.03em">Protected Data Source</text>

  <!-- Connection line segments with arrowheads -->
  <line x1="130" y1="88" x2="195" y2="88" class="svg-line" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arrow)"/>
  <line x1="345" y1="88" x2="385" y2="88" class="svg-line" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arrow)"/>
  <line x1="505" y1="88" x2="545" y2="88" class="svg-line" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arrow)"/>

  <!-- Return path with explicit arrowhead -->
  <path d="M 695 88 Q 745 88 745 118 Q 745 148 730 148 L 130 148 Q 75 148 75 125"
        fill="none" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="80,122 75,110 70,122" class="svg-arrow"/>
  <text x="420" y="165" text-anchor="middle" class="svg-text-muted" font-size="10">filtered response returned to caller</text>

  <!-- Caller -->
  <rect x="20" y="62" width="110" height="52" rx="8" class="svg-node-fill" stroke-width="1.5"/>
  <text x="75" y="82" text-anchor="middle" dy="0.35em" class="svg-text" font-size="14" font-weight="500">Caller</text>
  <text x="75" y="100" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="10">API, Agent, MCP</text>

  <!-- PRE handler -->
  <rect x="195" y="55" width="150" height="66" rx="6" class="svg-node-fill svg-pre-box" stroke-width="2"/>
  <text x="270" y="72" text-anchor="middle" dy="0.35em" class="svg-text" font-size="13" font-weight="600">PRE</text>
  <text x="270" y="90" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="11">Modify arguments</text>
  <text x="270" y="107" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="9">cap, inject, rewrite query</text>

  <!-- Method -->
  <rect x="385" y="58" width="120" height="60" rx="8" class="svg-node-fill" stroke-width="1.5"/>
  <text x="445" y="80" text-anchor="middle" dy="0.35em" class="svg-text" font-size="14" font-weight="500">Method</text>
  <text x="445" y="100" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="10">DB, service, tool</text>

  <!-- POST handler -->
  <rect x="545" y="55" width="150" height="66" rx="6" class="svg-node-fill svg-post-box" stroke-width="2"/>
  <text x="620" y="72" text-anchor="middle" dy="0.35em" class="svg-text" font-size="13" font-weight="600">POST</text>
  <text x="620" y="90" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="11">Filter response</text>
  <text x="620" y="107" text-anchor="middle" dy="0.35em" class="svg-text-muted" font-size="9">blacken, redact, classify</text>

  <!-- Annotation labels under PRE and POST -->
  <text x="270" y="185" text-anchor="middle" class="svg-text-muted" font-size="9"
        font-family="'JetBrains Mono', monospace">@PreEnforce  @QueryEnforce</text>
  <text x="270" y="197" text-anchor="middle" class="svg-text-muted" font-size="9"
        font-family="'JetBrains Mono', monospace">@Enforce* (streaming)</text>
  <text x="620" y="185" text-anchor="middle" class="svg-text-muted" font-size="9"
        font-family="'JetBrains Mono', monospace">@PostEnforce  @QueryEnforce</text>
  <text x="620" y="197" text-anchor="middle" class="svg-text-muted" font-size="9"
        font-family="'JetBrains Mono', monospace">@Enforce* (streaming)</text>
</svg>

<script>
(function() {
  function applyTheme() {
    var s = getComputedStyle(document.documentElement);
    var v = function(n) { return s.getPropertyValue(n).trim(); };
    var svg = document.getElementById('ds-chain-svg');
    if (!svg) return;
    svg.querySelectorAll('.svg-bg').forEach(function(el) { el.setAttribute('fill', v('--d-bg')); });
    svg.querySelectorAll('.svg-node-fill').forEach(function(el) { el.setAttribute('fill', v('--d-node-fill')); el.setAttribute('stroke', v('--d-node-stroke')); });
    svg.querySelectorAll('.svg-line').forEach(function(el) { el.setAttribute('stroke', v('--d-line-active')); });
    svg.querySelectorAll('.svg-arrow').forEach(function(el) { el.setAttribute('fill', v('--d-line-active')); el.setAttribute('stroke', 'none'); });
    svg.querySelectorAll('.svg-text').forEach(function(el) { el.setAttribute('fill', v('--d-text')); });
    svg.querySelectorAll('.svg-text-secondary').forEach(function(el) { el.setAttribute('fill', v('--d-text-secondary')); });
    svg.querySelectorAll('.svg-text-muted').forEach(function(el) { el.setAttribute('fill', v('--d-text-muted')); });
    svg.querySelectorAll('.svg-container-stroke').forEach(function(el) { el.setAttribute('stroke', v('--d-container-stroke')); });
    svg.querySelectorAll('.svg-container-fill').forEach(function(el) { el.setAttribute('fill', v('--d-container-fill')); });
    svg.querySelectorAll('.svg-container-label').forEach(function(el) { el.setAttribute('fill', v('--d-container-label')); });
    svg.querySelectorAll('.svg-pre-box').forEach(function(el) { el.setAttribute('stroke', v('--d-permit')); });
    svg.querySelectorAll('.svg-post-box').forEach(function(el) { el.setAttribute('stroke', v('--d-token')); });
  }
  requestAnimationFrame(applyTheme);
  new MutationObserver(applyTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();
</script>
