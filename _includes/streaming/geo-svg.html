<svg id="geo-svg" viewBox="0 0 800 530" width="100%" xmlns="http://www.w3.org/2000/svg"
     text-rendering="optimizeLegibility" shape-rendering="geometricPrecision"
     style="display: block; margin: 0 auto; max-width: 800px;">
  <rect width="800" height="530" rx="12" class="svg-bg"/>
  <text id="geo-narration" x="400" y="32" text-anchor="middle" class="svg-narration" font-size="16" font-weight="600"></text>

  <!-- Left column -->
  <rect x="20" y="50" width="180" height="120" rx="8" class="svg-node-fill" stroke-width="1.5" filter="url(#node-shadow)"/>
  <text x="110" y="66" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="10" font-weight="600">Stream Output</text>
  <text id="geo-s1" x="30" y="84" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>
  <text id="geo-s2" x="30" y="97" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>
  <text id="geo-s3" x="30" y="110" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>
  <text id="geo-s4" x="30" y="123" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>
  <text id="geo-s5" x="30" y="136" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>
  <text id="geo-s6" x="30" y="149" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>
  <text id="geo-s7" x="30" y="162" class="svg-text-secondary" font-size="9" opacity="0" font-family="'JetBrains Mono', monospace"></text>

  <rect x="20" y="220" width="180" height="60" rx="8" class="svg-node-fill" stroke-width="1.5" filter="url(#node-shadow)"/>
  <text x="110" y="244" text-anchor="middle" dy="0.35em" class="svg-text" font-size="13" font-weight="500">Client</text>
  <text x="110" y="260" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="9">(Trader A)</text>

  <!-- PIP: Traccar -->
  <rect x="20" y="320" width="180" height="160" rx="10" class="svg-node-fill" stroke-width="1.5" filter="url(#node-shadow)"/>
  <text x="110" y="335" text-anchor="middle" dy="0.35em" class="svg-text" font-size="11" font-weight="600">PIP: Traccar</text>
  <text x="110" y="348" text-anchor="middle" dy="0.35em" class="svg-text-secondary" font-size="8">Location Tracking</text>
  <circle cx="110" cy="410" r="50" fill="none" stroke-width="1" stroke-dasharray="4 2" class="svg-container-stroke" opacity="0.5"/>
  <text x="110" y="468" text-anchor="middle" class="svg-text-muted" font-size="8">Trading Floor</text>
  <circle id="geo-dot" cx="110" cy="395" r="5" class="svg-token-fill"/>
  <text id="geo-dot-label" x="110" y="383" text-anchor="middle" class="svg-text-secondary" font-size="8">Trader A</text>

  <!-- Protected Data Source container -->
  <rect x="260" y="130" width="515" height="180" rx="14" class="svg-container-fill svg-container-stroke" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="518" y="148" text-anchor="middle" class="svg-container-label" font-size="13" font-weight="500" letter-spacing="0.03em">Protected Data Source</text>

  <!-- PEP -->
  <rect x="310" y="170" width="150" height="115" rx="10" class="svg-node-fill" stroke-width="1.5" filter="url(#node-shadow)"/>
  <text x="385" y="198" text-anchor="middle" dy="0.35em" class="svg-text" font-size="14" font-weight="600">PEP</text>
  <rect id="geo-state-bg" x="335" y="235" width="100" height="28" rx="14" class="svg-state-bg" stroke-width="1"/>
  <text id="geo-pep-state" x="385" y="249" text-anchor="middle" dy="0.35em" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace" font-size="11" font-weight="500" class="svg-state-initial">PENDING</text>

  <!-- Data Source -->
  <rect x="570" y="220" width="160" height="60" rx="8" class="svg-node-fill" stroke-width="1.5" filter="url(#node-shadow)"/>
  <text x="650" y="250" text-anchor="middle" dy="0.35em" class="svg-text" font-size="13" font-weight="500">Market Feed</text>

  <!-- PDP -->
  <rect x="335" y="370" width="100" height="55" rx="8" class="svg-node-fill" stroke-width="1.5" filter="url(#node-shadow)"/>
  <text x="385" y="398" text-anchor="middle" dy="0.35em" class="svg-text" font-size="13" font-weight="500">PDP</text>

  <!-- Policy text -->
  <text x="450" y="385" text-anchor="start" font-family="'JetBrains Mono', monospace" class="svg-text-muted" font-size="9">var pos = subject.deviceId.&lt;traccar.position&gt;</text>
  <text id="geo-policy-line" x="450" y="400" text-anchor="start" font-family="'JetBrains Mono', monospace" class="svg-text-muted" font-size="9">geo.within(pos, tradingFloorZone)</text>
  <rect id="geo-cond-bg" x="658" y="391" width="50" height="18" rx="9" class="svg-state-bg" stroke-width="1" opacity="0"/>
  <text id="geo-condition" x="683" y="400" text-anchor="middle" dy="0.35em" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="600" opacity="0"></text>

  <!-- Connection glow layers -->
  <line id="geo-glow-client-pep" x1="200" y1="250" x2="310" y2="250" stroke-width="8" stroke-linecap="round" opacity="0" class="svg-line-glow"/>
  <line id="geo-glow-pep-source" x1="460" y1="250" x2="570" y2="250" stroke-width="8" stroke-linecap="round" opacity="0" class="svg-line-glow"/>
  <line id="geo-glow-pep-pdp" x1="385" y1="285" x2="385" y2="370" stroke-width="8" stroke-linecap="round" opacity="0" class="svg-line-glow"/>
  <line id="geo-glow-pip-pdp" x1="200" y1="400" x2="335" y2="400" stroke-width="8" stroke-linecap="round" opacity="0" class="svg-line-glow"/>

  <!-- Connection lines -->
  <line id="geo-line-client-pep" x1="200" y1="250" x2="310" y2="250" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <line id="geo-line-pep-source" x1="460" y1="250" x2="570" y2="250" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <line id="geo-line-pep-pdp" x1="385" y1="285" x2="385" y2="370" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>
  <line id="geo-line-pip-pdp" x1="200" y1="400" x2="335" y2="400" class="svg-line" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Subscription labels -->
  <text id="geo-lbl-client-pep" x="255" y="266" text-anchor="middle" font-size="10" font-weight="500" class="svg-text-muted" opacity="0"></text>
  <text id="geo-lbl-pep-source" x="515" y="266" text-anchor="middle" font-size="10" font-weight="500" class="svg-text-muted" opacity="0"></text>
  <text id="geo-lbl-pep-pdp" x="405" y="330" text-anchor="start" font-size="10" font-weight="500" class="svg-text-muted" opacity="0"></text>
  <text id="geo-lbl-pip-pdp" x="268" y="416" text-anchor="middle" font-size="10" font-weight="500" class="svg-text-muted" opacity="0"></text>

  <!-- Token -->
  <circle id="geo-token-glow" cx="-20" cy="-20" r="6" opacity="0" filter="url(#token-glow)" class="svg-token-fill"/>
  <circle id="geo-token" cx="-20" cy="-20" r="3.5" opacity="0" class="svg-token-fill"/>
  <rect id="geo-token-pill" x="-60" y="-50" width="0" height="18" rx="4" opacity="0" class="svg-token-pill"/>
  <text id="geo-token-label" x="-20" y="-38" text-anchor="middle" dominant-baseline="central" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500" opacity="0" class="svg-text"></text>

  <!-- Drop indicator -->
  <text id="geo-drop" x="385" y="225" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" opacity="0" class="svg-drop-text">dropped</text>
</svg>
