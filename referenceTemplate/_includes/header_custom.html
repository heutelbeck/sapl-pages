<button class="jtd-theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode" style="background:none;border:1px solid var(--border-color,#44434d);border-radius:4px;padding:4px 6px;cursor:pointer;color:var(--body-text-color,#e6e1e8);display:inline-flex;align-items:center;margin-left:0.5rem;">
  <svg class="jtd-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="jtd-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<script>
(function() {
  function applyTheme(theme) {
    var dark = document.getElementById('jtd-theme-dark');
    var light = document.getElementById('jtd-theme-light');
    if (theme === 'light') {
      dark.disabled = true;
      light.disabled = false;
    } else {
      dark.disabled = false;
      light.disabled = true;
    }
    // Update icon visibility
    var sun = document.querySelector('.jtd-icon-sun');
    var moon = document.querySelector('.jtd-icon-moon');
    if (sun && moon) {
      sun.style.display = theme === 'dark' ? 'block' : 'none';
      moon.style.display = theme === 'dark' ? 'none' : 'block';
    }
  }

  // Apply on load
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var current = saved || (prefersDark ? 'dark' : 'light');
  applyTheme(current);

  function notifyEmbeds(theme) {
    var msg = {type: 'sapl-theme', dark: theme === 'dark'};
    for (var i = 0; i < window.frames.length; i++) {
      try { window.frames[i].postMessage(msg, '*'); } catch(e) {}
    }
  }

  // Notify embeds when iframes appear
  var embedTimer;
  new MutationObserver(function() {
    clearTimeout(embedTimer);
    embedTimer = setTimeout(function() { notifyEmbeds(current); }, 500);
  }).observe(document.body, {childList: true, subtree: true});

  // Toggle on click
  document.querySelector('.jtd-theme-toggle').addEventListener('click', function() {
    var isDark = !document.getElementById('jtd-theme-dark').disabled;
    var next = isDark ? 'light' : 'dark';
    current = next;
    applyTheme(next);
    localStorage.setItem('theme', next);
    notifyEmbeds(next);
  });
})();
</script>
